# Keep the original bundle id so existing memoize Alpha installs can
# auto-update in place through Squirrel.Mac. The visible app name and release
# feed are Zuse, but macOS updater identity must remain stable.
appId: app.memoize.desktop
productName: Zuse Alpha
copyright: © ${author}

# Register the `zuse://` custom scheme so packaged builds receive the WorkOS
# OAuth callback (`zuse://auth/callback`) as a deep link. On macOS this
# writes CFBundleURLTypes into Info.plist; combined with the unique appId above
# the OS routes the scheme unambiguously (unlike dev's shared Electron.app).
protocols:
  - name: zuse
    schemes:
      - zuse

# Output the .dmg + latest-mac.yml + blockmap to repo-root/dist so all
# distributables for all apps land in one place. Build resources (icon,
# entitlements) live in apps/desktop/build/.
directories:
  output: ../../dist
  buildResources: build

# What to pack inside app.asar. The renderer's Vite output is shipped
# alongside (not inside) the asar via `extraResources` below — keeping
# cross-package paths out of the asar avoids electron-builder's
# `must be under …/apps/desktop/` filter complaining about asarUnpack
# patterns evaluated against files originating outside this project.
files:
  - dist-electron/**/*
  - "package.json"
  - "!**/*.{ts,tsx,map,md}"
  - "!**/tsconfig*.json"
  # @zuse/* workspace packages are inlined into dist-electron/main.cjs by
  # tsdown (`deps.alwaysBundle`), so we don't need their source in
  # node_modules. Their bun symlinks resolve to apps/server and apps/wire,
  # which trip electron-builder's "must be under apps/desktop/" check during
  # the asarUnpack walk. Exclude them outright.
  - "!node_modules/@zuse/**"
  # Build-time tooling and type packages — never required at runtime.
  - "!node_modules/@repo/**"
  - "!node_modules/@types/**"
  - "!node_modules/@electron/rebuild/**"
  - "!node_modules/electron-builder/**"
  - "!node_modules/sharp/**"
  - "!node_modules/tsdown/**"
  - "!node_modules/typescript/**"
extraResources:
  - from: ../renderer/dist
    to: app/renderer/dist
    filter: ["**/*"]
  - from: resources/skills
    to: app/skills
    filter: ["**/*"]

# Native bindings can't load from inside an asar; they need to live as
# real files on disk. electron-builder writes these to app.asar.unpacked/
# and the loader transparently rewrites the path.
# browser-mcp-child.cjs is spawned by bun (Grok's zuse-browser MCP server) —
# an external process that can't read inside the asar, so it must be unpacked
# too; browser-mcp-bridge.ts rewrites app.asar → app.asar.unpacked when
# resolving it.
asar: true
asarUnpack:
  - "**/*.node"
  - "dist-electron/browser-mcp-child.cjs"
  - "node_modules/better-sqlite3/**"
  - "node_modules/node-pty/**"
  - "node_modules/keytar/**"

# We rebuild natives via the existing electron-rebuild postinstall hook.
# electron-builder's npmRebuild step doesn't understand bun workspaces.
npmRebuild: false

mac:
  category: public.app-category.developer-tools
  # Two targets, one signed/notarized `.app`:
  #   * dmg  — what humans download from the Releases page for first install.
  #   * zip  — what `electron-updater` (Squirrel.Mac under the hood) consumes
  #            to apply auto-updates. Squirrel.Mac cannot read DMGs; without a
  #            zip in `latest-mac.yml` the updater throws "ZIP file not
  #            provided" and every installed copy is stranded on its current
  #            version. See plans/zip-file-not-provided-jolly-lantern.md.
  target:
    - target: dmg
      arch: universal
    - target: zip
      arch: universal
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  icon: build/icon.png
  extendInfo:
    NSCameraUsageDescription: Zuse Alpha does not use the camera.
    NSMicrophoneUsageDescription: Zuse Alpha does not use the microphone.

dmg:
  writeUpdateInfo: true
  sign: false
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# electron-updater consumes latest-mac.yml from the GitHub Release
# associated with this repo. With `releaseType: release`, the release
# workflow uploads the .dmg + latest-mac.yml as a *published* release, so
# every tag push goes live immediately and electron-updater (in the
# in-the-wild app) can see the new version with no manual promotion step.
# Switch back to `releaseType: draft` if you'd rather gate each release
# behind a manual "Draft" -> "Published" flip in the GitHub Releases UI.
publish:
  provider: github
  owner: swarajbachu
  repo: zuse
  releaseType: release
